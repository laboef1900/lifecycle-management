name: Publish images

# Builds and pushes lcm-server + lcm-web images to GHCR.
#
# Tagging policy:
#   - push to main      → :latest
#   - push to dev       → :dev
#   - release published → :<version>  (e.g. v0.1 → :0.1)
#
# main is protected and only accepts merges from PRs with green CI, so the
# code that reaches `push: main` is already verified. dev is loosely
# protected; `:dev` may occasionally lag the latest green commit.

on:
  push:
    branches: [main, dev]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: lcm-server, dockerfile: docker/Dockerfile.server }
          - { name: lcm-web, dockerfile: docker/Dockerfile.web }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
            type=match,pattern=v(.*),group=1,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
