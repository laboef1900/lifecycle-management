name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Use Corepack (bundled with Node 26) to provision pnpm at the version
      # pinned in package.json's `packageManager` field. Replaces
      # pnpm/action-setup, which was hitting persistent codeload.github.com
      # download failures (2026-05-26).
      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '26'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate the Prisma client so its type stubs (Prisma.Decimal, model
      # types, …) exist before any typecheck / test step that imports them.
      - name: Generate Prisma client
        run: pnpm --filter @lcm/server exec prisma generate

      # Generate the TanStack Router route tree (src/routeTree.gen.ts is
      # gitignored; the Vite plugin produces it during dev/build, but
      # typecheck runs before either).
      - name: Generate web route tree
        run: pnpm --filter @lcm/web generate-routes

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # apps/server integration tests spin up their own Postgres 18 container via
      # @testcontainers/postgresql. ubuntu-latest already exposes the Docker
      # socket, so no extra service is needed.
      - name: Test
        run: pnpm test

      - name: Build web bundle
        run: pnpm build

  oidc-e2e:
    name: OIDC auth e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '26'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @lcm/server exec prisma generate

      - name: Generate web route tree
        run: pnpm --filter @lcm/web generate-routes

      # Only Chromium is needed; --with-deps installs the OS libraries it links.
      - name: Install Playwright Chromium
        run: pnpm --filter @lcm/web exec playwright install --with-deps chromium

      # Boots a throwaway Postgres 18 (via @testcontainers/postgresql over the
      # runner's Docker socket) + an in-process mock IdP + the API server in
      # oidc mode, then drives the real browser login/logout flow.
      - name: Run OIDC auth e2e
        run: pnpm --filter @lcm/web test:e2e:oidc
