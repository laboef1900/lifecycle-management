name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate the Prisma client so its type stubs (Prisma.Decimal, model
      # types, …) exist before any typecheck / test step that imports them.
      - name: Generate Prisma client
        run: pnpm --filter @lcm/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # apps/api integration tests spin up their own Postgres 16 container via
      # @testcontainers/postgresql. ubuntu-latest already exposes the Docker
      # socket, so no extra service is needed.
      - name: Test
        run: pnpm test

      - name: Build web bundle
        run: pnpm build
