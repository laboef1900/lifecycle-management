name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use Corepack (bundled with Node 22) to provision pnpm at the version
      # pinned in package.json's `packageManager` field. Replaces
      # pnpm/action-setup, which was hitting persistent codeload.github.com
      # download failures (2026-05-26).
      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate the Prisma client so its type stubs (Prisma.Decimal, model
      # types, …) exist before any typecheck / test step that imports them.
      - name: Generate Prisma client
        run: pnpm --filter @lcm/api exec prisma generate

      # Generate the TanStack Router route tree (src/routeTree.gen.ts is
      # gitignored; the Vite plugin produces it during dev/build, but
      # typecheck runs before either).
      - name: Generate web route tree
        run: pnpm --filter @lcm/web generate-routes

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # apps/api integration tests spin up their own Postgres 16 container via
      # @testcontainers/postgresql. ubuntu-latest already exposes the Docker
      # socket, so no extra service is needed.
      - name: Test
        run: pnpm test

      - name: Build web bundle
        run: pnpm build
