packages:
  - 'apps/*'
  - 'packages/*'
overrides:
  '@radix-ui/react-dialog': 1.1.16
  '@radix-ui/react-slot': 1.2.5
  semver: ^7.7.0
allowBuilds:
  esbuild: true
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  cpu-features: false
  protobufjs: true
  ssh2: false
blockExoticSubdeps: true
minimumReleaseAge: 10080
trustPolicy: no-downgrade
