name: lcm-dev

services:
  db:
    image: postgres:16-alpine
    container_name: lcm-db-dev
    environment:
      POSTGRES_USER: lcm
      POSTGRES_PASSWORD: lcm
      POSTGRES_DB: lcm
    ports:
      - '5432:5432'
    volumes:
      - lcm-postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lcm -d lcm']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: lcm-keycloak-dev
    profiles: [auth]
    command: ['start-dev', '--import-realm', '--http-port=8081']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - '8081:8081'
    volumes:
      - ./keycloak/lcm-dev-realm.json:/opt/keycloak/data/import/lcm-dev-realm.json:ro

volumes:
  lcm-postgres-dev:
