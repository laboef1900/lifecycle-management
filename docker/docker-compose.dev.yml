name: lcm-dev

services:
  db:
    image: postgres:18-alpine
    container_name: lcm-db-dev
    environment:
      POSTGRES_USER: lcm
      POSTGRES_PASSWORD: lcm
      POSTGRES_DB: lcm
    ports:
      - '5432:5432'
    volumes:
      # Official postgres:18 sets PGDATA=/var/lib/postgresql/18/docker (a
      # major-version subdir), NOT /var/lib/postgresql/data. Mount the PARENT so
      # data persists on the volume — the image's recommended layout for 18+
      # (also enables `pg_upgrade --link` across future majors). Mounting the old
      # /data path leaves PG18 writing to an ephemeral container layer.
      - lcm-postgres-dev:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lcm -d lcm']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: lcm-keycloak-dev
    profiles: [auth]
    command: ['start-dev', '--import-realm', '--http-port=8081']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - '8081:8081'
    volumes:
      - ./keycloak/lcm-dev-realm.json:/opt/keycloak/data/import/lcm-dev-realm.json:ro

volumes:
  lcm-postgres-dev:
