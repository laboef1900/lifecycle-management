# Production compose for self-hosted deployment.
#
# Run from the repo root; .env at the root carries `COMPOSE_FILE=docker/docker-compose.yml`
# so the standard `docker compose ...` invocations find this file automatically:
#   docker compose build
#   SEED_ON_BOOT=true docker compose up -d
#
# The build context is `..` (repo root) because the Dockerfiles COPY from
# apps/, packages/, and the root lockfile.
#
# For local dev (Postgres only), see `docker/docker-compose.dev.yml` —
# `pnpm db:dev:up` is the convenience wrapper.

name: lcm

services:
  db:
    image: postgres:16-alpine
    container_name: lcm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lcm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lcm}
      POSTGRES_DB: ${POSTGRES_DB:-lcm}
    volumes:
      - lcm-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-lcm} -d ${POSTGRES_DB:-lcm}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: lcm-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lcm}:${POSTGRES_PASSWORD:-lcm}@db:5432/${POSTGRES_DB:-lcm}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1:8080/readyz
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: lcm-web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '${HTTP_PORT:-80}:80'
    restart: unless-stopped

volumes:
  lcm-postgres:
    name: lcm-postgres-data
