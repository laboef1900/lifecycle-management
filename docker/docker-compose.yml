# Production compose for self-hosted deployment.
#
# Pulls pre-built images from GHCR — there are no `build:` blocks here. To
# publish new images, push to `main`/`dev` or cut a release; the
# `.github/workflows/publish-images.yml` workflow builds and pushes them.
# To test an unpublished change locally, build the image by hand:
#   docker build -f docker/Dockerfile.server -t ghcr.io/laboef1900/lcm-server:latest ..
#
# Run from the repo root; .env at the root carries
# `COMPOSE_FILE=docker/docker-compose.yml` so the standard
# `docker compose ...` invocations find this file automatically:
#   SEED_ON_BOOT=true docker compose up -d
#
# For local dev (Postgres only), see `docker/docker-compose.dev.yml` —
# `pnpm db:dev:up` is the convenience wrapper.

name: lcm

services:
  db:
    # Pinned tag@digest to the multi-arch index digest; Dependabot's
    # docker ecosystem bumps it.
    image: dhi.io/postgres:18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
    container_name: lcm-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lcm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lcm}
    volumes:
      # DHI postgres:18 sets PGDATA=/var/lib/postgresql/18/data (note the
      # major-version segment), not /var/lib/postgresql/data as the official
      # postgres image does. The volume must be mounted at the right path or
      # the DB initializes inside an ephemeral container layer.
      - lcm-postgres-18:/var/lib/postgresql/18/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-lcm} -d ${POSTGRES_DB:-lcm}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 2
    pids_limit: 256

  server:
    image: ghcr.io/laboef1900/lcm-server:${LCM_IMAGE_TAG:-latest}
    container_name: lcm-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lcm}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/${POSTGRES_DB:-lcm}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      TRUST_PROXY: ${TRUST_PROXY:-loopback,uniquelocal}
      # Required to start at all — fail-closed, same as POSTGRES_PASSWORD
      # above. Encrypts the DB-backed OIDC config (client secret, the
      # app-generated login-state signing secret). Generate once with:
      #   openssl rand -base64 32
      # Losing/rotating it after OIDC is enabled forces auth back to
      # disabled and requires re-entering the client secret via
      # Settings → Authentication — see docs/operations.md.
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY must be set — generate with 'openssl rand -base64 32'}
      # Break-glass: `true` forces auth disabled on next boot regardless of
      # the stored config. See docs/operations.md ("Break-glass").
      RECOVERY_DISABLE_AUTH: ${RECOVERY_DISABLE_AUTH:-false}
      # ---- OIDC seed vars — first-boot only, ignored afterwards ----
      # Configure OIDC via the app's Settings → Authentication panel
      # instead of editing these post-deploy; see docs/operations.md.
      AUTH_MODE: ${AUTH_MODE:-disabled}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      LOGIN_STATE_SECRET: ${LOGIN_STATE_SECRET:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      OIDC_ROLE_CLAIM: ${OIDC_ROLE_CLAIM:-}
      OIDC_ADMIN_VALUES: ${OIDC_ADMIN_VALUES:-}
      OIDC_DEFAULT_ROLE: ${OIDC_DEFAULT_ROLE:-admin}
      OIDC_ALLOWED_EMAIL_DOMAINS: ${OIDC_ALLOWED_EMAIL_DOMAINS:-}
      OIDC_ALLOWED_EMAILS: ${OIDC_ALLOWED_EMAILS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # The distroless runtime image has no wget/curl/shell — only `node`.
      # Use Node 22's built-in fetch for the readiness probe.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp

  web:
    image: ghcr.io/laboef1900/lcm-web:${LCM_IMAGE_TAG:-latest}
    container_name: lcm-web
    depends_on:
      server:
        condition: service_healthy
    # Container listens on 8080 — DHI's distroless nginx runs as nonroot
    # and can't bind privileged ports. Host-side HTTP_PORT (default 80)
    # is unchanged.
    ports:
      - '${HTTP_PORT:-80}:8080'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    pids_limit: 128
    # read_only: true — nginx cache paths on DHI image are unverified; not set

volumes:
  lcm-postgres-18:
    name: lcm-postgres-18-data
